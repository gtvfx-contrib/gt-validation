name: Lint

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  ruff:
    name: Ruff (lint + format check)
    runs-on: ["self-hosted", "Linux", "X64", "synology"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install gt-validation with dev extras
        working-directory: ${{ github.workspace }}/py
        run: python -m pip install --upgrade pip && pip install -e ..[dev]

      - name: Run ruff check
        run: ruff check py

      - name: Run ruff format --check
        run: ruff format --check py
